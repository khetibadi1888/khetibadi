services:
  - type: web
    name: khetibadi-proxy
    runtime: python
    rootDir: proxy
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn proxy:app
    envVars:
      - key: APPS_SCRIPT_URL
        sync: false       # set manually in Render dashboard — never in code
      - key: PROXY_SECRET
        generateValue: true   # Render auto-generates a random secret
      - key: ALLOWED_ORIGINS
        sync: false       # set to your GitHub Pages URL
      - key: PYTHON_VERSION
        value: 3.11.0
